version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

  auth-service:
    build: 
      context: .
      dockerfile: infra/docker/auth-service/Dockerfile
    environment:
      - MONGO_URI=mongodb://mongodb:27017/auth
      - JWT_KEY=asdf
    depends_on:
      - mongodb

  user-service:
    build: 
      context: .
      dockerfile: infra/docker/user-service/Dockerfile
    environment:
      - MONGO_URI=mongodb://mongodb:27017/user
    depends_on:
      - mongodb

  chat-service:
    build: 
      context: .
      dockerfile: infra/docker/chat-service/Dockerfile
    environment:
      - MONGO_URI=mongodb://mongodb:27017/chat
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - mongodb
      - kafka

  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - chat-service

volumes:
  mongo-data:
